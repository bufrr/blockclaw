services:
  blockclaw-gateway:
    image: ${BLOCKCLAW_IMAGE:-blockclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BLOCKCLAW_GATEWAY_TOKEN: ${BLOCKCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${BLOCKCLAW_CONFIG_DIR}:/home/node/.blockclaw
      - ${BLOCKCLAW_WORKSPACE_DIR}:/home/node/.blockclaw/workspace
    ports:
      - "${BLOCKCLAW_GATEWAY_PORT:-18789}:18789"
      - "${BLOCKCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${BLOCKCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  blockclaw-cli:
    image: ${BLOCKCLAW_IMAGE:-blockclaw:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BLOCKCLAW_GATEWAY_TOKEN: ${BLOCKCLAW_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${BLOCKCLAW_CONFIG_DIR}:/home/node/.blockclaw
      - ${BLOCKCLAW_WORKSPACE_DIR}:/home/node/.blockclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
